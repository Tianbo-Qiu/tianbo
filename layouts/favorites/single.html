{{ define "main" }}
  <article class="article">
    <h1>{{ .Title }}</h1>
    {{ with .Params.link }}
      <p class="favorite-outbound">
        <a href="{{ . }}" target="_blank" rel="noopener noreferrer">{{ . }}</a>
      </p>
    {{ end }}
    <div class="content">
      {{ .Content }}
    </div>
  </article>
{{ end }}
