{{- /* Vercel Web Analytics: tiny inline bootstrap + deferred script. Only emitted when building on Vercel (see getenv "VERCEL"). Enable Analytics in the project dashboard, then redeploy. */ -}}
{{- if getenv "VERCEL" -}}
<script>
  window.va =
    window.va ||
    function () {
      (window.vaq = window.vaq || []).push(arguments);
    };
</script>
<script defer src="/_vercel/insights/script.js"></script>
{{- end -}}
