{{ if or (isset .Params "coffee") (isset .Params "go_loc") (isset .Params "healthy_meals") }}
  {{ $coffee := .Params.coffee | default 0 }}
  {{ $goLoc := .Params.go_loc | default 0 }}
  {{ $meals := .Params.healthy_meals | default 0 }}
  <div class="today-stats" aria-label="当日记录">
    <span class="today-stat" data-tip="咖啡（杯）" aria-label="咖啡（杯）" tabindex="0">
      <svg class="today-stat-ic" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M18 8h1a4 4 0 0 1 0 8h-1"/>
        <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
        <line x1="6" y1="1" x2="6" y2="4"/>
        <line x1="10" y1="1" x2="10" y2="4"/>
        <line x1="14" y1="1" x2="14" y2="4"/>
      </svg>
      <span class="today-stat-n">{{ $coffee }}</span>
    </span>
    <span class="today-stat" data-tip="Go 代码行数（LOC）" aria-label="Go 代码行数（LOC）" tabindex="0">
      <svg class="today-stat-ic" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="16 18 22 12 16 6"/>
        <polyline points="8 6 2 12 8 18"/>
      </svg>
      <span class="today-stat-n">{{ $goLoc }}</span>
    </span>
    <span class="today-stat" data-tip="健康餐（顿）" aria-label="健康餐（顿）" tabindex="0">
      <svg class="today-stat-ic" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      <span class="today-stat-n">{{ $meals }}</span>
    </span>
  </div>
{{ end }}
