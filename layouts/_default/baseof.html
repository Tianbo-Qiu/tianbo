<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
  <link rel="icon" type="image/png" href="/images/avatar.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      line-height: 1.65;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    a {
      color: #0b57d0;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; text-underline-offset: 2px; }
    a:focus-visible {
      outline: 2px solid #0b57d0;
      outline-offset: 2px;
    }
    .wrap {
      max-width: 40rem;
      margin: 0 auto;
      padding: clamp(1.75rem, 4vw, 2.25rem) clamp(1.25rem, 4vw, 1.75rem) 3.5rem;
    }
    .site-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem 1.5rem;
      margin-bottom: 2rem;
      padding-bottom: 1.15rem;
      border-bottom: 1px solid #e8e8e8;
    }
    .site-header-brand {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      min-width: 0;
      text-decoration: none;
      color: inherit;
      border-radius: 999px;
      margin: -0.2rem;
      padding: 0.2rem 0.35rem 0.2rem 0.2rem;
    }
    .site-header-brand:hover {
      text-decoration: none;
    }
    .site-header-brand:hover .site-header-name {
      color: #0b57d0;
    }
    .site-header-brand:focus-visible {
      outline: 2px solid #0b57d0;
      outline-offset: 2px;
    }
    .site-header-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      background: #eee;
    }
    .site-header-name {
      font-size: 0.9375rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.3;
      color: #1a1a1a;
    }
    .site-header-nav {
      font-size: 0.875rem;
      color: #5c5c5c;
      line-height: 1.4;
    }
    .site-header-nav a {
      color: #5c5c5c;
    }
    .site-header-nav a:hover {
      color: #0b57d0;
    }
    .nav-sep {
      margin: 0 0.35rem;
      color: #bbb;
    }
    .page-title {
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: #2a2a2a;
      margin-bottom: 0.65rem;
    }
    .page-title--kicker {
      font-size: 0.8125rem;
      font-weight: 600;
      color: #3a3a3a;
      letter-spacing: 0.16em;
      line-height: 1.4;
      margin-bottom: 1rem;
    }
    .section-desc {
      color: #666;
      font-size: 0.875rem;
      line-height: 1.55;
      margin-bottom: 1.25rem;
    }
    .note-list {
      list-style: none;
    }
    .note-list li {
      margin-bottom: 0.45rem;
      line-height: 1.45;
    }
    .note-list a {
      font-size: 0.98rem;
      font-family: ui-serif, "New York", "Songti SC", "Noto Serif SC", "STSong", Georgia, serif;
      color: #262626;
    }
    .note-list a:hover {
      color: #0b57d0;
    }
    .note-meta {
      color: #888;
      font-size: 0.8rem;
    }
    .note-list .note-meta {
      display: inline-block;
      margin-right: 0.55rem;
      font-variant-numeric: tabular-nums;
    }
    .article h1 {
      font-size: clamp(1.25rem, 2.5vw, 1.4rem);
      font-weight: 600;
      margin-bottom: 1.35rem;
      line-height: 1.35;
      letter-spacing: -0.02em;
    }
    .article .content {
      font-family: ui-serif, "New York", "Iowan Old Style", "Palatino Linotype", Palatino, "Songti SC", "Noto Serif SC", "Source Han Serif SC", "STSong", "SimSun", Georgia, serif;
      line-height: 1.74;
      color: #262626;
      font-size: 1rem;
      letter-spacing: 0.01em;
    }
    .article .content p { margin-bottom: 0.85em; }
    .article .content p:last-child { margin-bottom: 0; }
    .article .content ul, .article .content ol {
      margin: 0.5em 0 1em 1.25em;
    }
    .article .content li { margin-bottom: 0.35em; }
    .article .content strong {
      font-weight: 600;
      color: #111;
    }
    .article .content h3 {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      color: #6a6a6a;
      letter-spacing: 0.1em;
      margin: 0 0 0.5rem;
      line-height: 1.35;
    }
    .article .content h3:not(:first-child) {
      margin-top: 1.35rem;
    }
    .article .content h3 + p { margin-top: 0; }
  </style>
  {{ partial "vercel-analytics.html" . }}
</head>
<body>
  <div class="wrap">
    <header class="site-header">
      <a class="site-header-brand" href="{{ "/" | relURL }}">
        <img
          class="site-header-avatar"
          src="{{ "/images/avatar.png" | relURL }}"
          alt=""
          width="44"
          height="44"
          decoding="async"
        />
        <span class="site-header-name">{{ .Site.Params.name }}</span>
      </a>
      <nav class="site-header-nav" aria-label="栏目">
        <a href="{{ "/" | relURL }}">首页</a><span class="nav-sep">·</span><a href="{{ "/today/" | relURL }}">今日</a><span class="nav-sep">·</span><a href="{{ "/notes/" | relURL }}">笔记</a>
      </nav>
    </header>
    {{ block "main" . }}{{ end }}
  </div>
</body>
</html>
