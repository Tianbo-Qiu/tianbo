<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
  <link rel="icon" type="image/png" href="/images/avatar.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      line-height: 1.6;
      min-height: 100vh;
    }
    a {
      color: #0066cc;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
    .wrap {
      max-width: 38rem;
      margin: 0 auto;
      padding: 2rem 1.5rem 3rem;
    }
    .nav {
      font-size: 0.875rem;
      color: #666;
      margin-bottom: 2.5rem;
    }
    .nav a { color: #666; }
    .nav a:hover { color: #0066cc; }
    .nav-sep { margin: 0 0.35rem; color: #bbb; }
    .page-title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.35rem;
    }
    .section-desc {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .note-list {
      list-style: none;
    }
    .note-list li {
      margin-bottom: 0.85rem;
    }
    .note-list a {
      font-size: 1rem;
    }
    .note-meta {
      color: #888;
      font-size: 0.8rem;
      margin-left: 0.5rem;
    }
    .article h1 {
      font-size: 1.35rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
      line-height: 1.35;
    }
    .article .content {
      line-height: 1.75;
      color: #1a1a1a;
    }
    .article .content p { margin-bottom: 1em; }
    .article .content p:last-child { margin-bottom: 0; }
    .article .content ul, .article .content ol {
      margin: 0.5em 0 1em 1.25em;
    }
    .article .content li { margin-bottom: 0.35em; }
    .article .content strong {
      font-weight: 600;
      color: #111;
    }
    .article .content h3 {
      font-size: 0.8rem;
      font-weight: 600;
      color: #888;
      letter-spacing: 0.04em;
      margin: 0 0 0.75rem;
    }
    .article .content h3:not(:first-child) {
      margin-top: 2rem;
    }
    .article .content h3 + p { margin-top: 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <nav class="nav" aria-label="站点">
      <a href="/">首页</a><span class="nav-sep">·</span><a href="/notes/">笔记</a>
    </nav>
    {{ block "main" . }}{{ end }}
  </div>
</body>
</html>
