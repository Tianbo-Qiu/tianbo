{{ define "main" }}
  <header>
    <h1 class="page-title">{{ .Title }}</h1>
    {{ with .Params.description }}<p class="section-desc">{{ . }}</p>{{ end }}
  </header>
  <ul class="note-list">
    {{ range .Pages.ByDate.Reverse }}
      <li>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        {{ if .Date }}<span class="note-meta">{{ .Date.Format "2006-01-02" }}</span>{{ end }}
      </li>
    {{ end }}
  </ul>
{{ end }}
